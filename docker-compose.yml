# DWES2 orchestration: the API and its SQL Server database on a shared network.
# Ports follow the brief — 8009 (API, San Valero user 28009) and 9008 (DB, inverted).
# Inside the network the API reaches the DB by the service name "db" on 1433; the
# 9008 mapping is only for host access. .NET 8 listens on 8080 inside the api container.

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "IRacing!Pass2026"
    ports:
      - "9008:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      # api waits on this so it doesn't race the database during warm-up.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - iracing

  api:
    build:
      context: .
      dockerfile: API/Dockerfile
    environment:
      # Points at the db service by name; overrides appsettings via the standard
      # ConnectionStrings__ServerDB binding. Migrations are applied on boot (Program.cs).
      ConnectionStrings__ServerDB: "Server=db,1433;Database=IRacingLeague;User Id=sa;Password=IRacing!Pass2026;TrustServerCertificate=True;Encrypt=False"
      ASPNETCORE_ENVIRONMENT: "Production"
    ports:
      - "8009:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - iracing

volumes:
  mssql-data:

networks:
  iracing:
